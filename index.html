<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinna Store</title>
    <style>
        :root { --primary: #B76E79; --gold: #D4AF37; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background-color: #fdfbf7; color: #333; }
        
        /* Faixa Superior */
        .top-banner { background: var(--primary); color: #fff; text-align: center; padding: 10px; font-size: 0.8rem; text-transform: uppercase; }
        
        /* Grid Principal */
        header { padding: 40px 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Cards com Efeito Dourado */
        .nav-card { background: white; padding: 30px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .nav-card:hover { box-shadow: 0 0 15px var(--gold); border-color: var(--gold); }
        
        /* Cards de Produto */
        .product-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #eee; text-align: center; }
        .btn-round { border-radius: 25px; border: none; padding: 10px 20px; cursor: pointer; background: var(--primary); color: white; margin-top: 10px; }
        .qty-selector { margin: 10px 0; }
        .qty-btn { border-radius: 50%; width: 30px; height: 30px; border: 1px solid #ccc; cursor: pointer; background: white; }
        
        /* Carrinho Lateral */
        #side-cart { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; z-index: 1000; padding: 20px; display: flex; flex-direction: column; }
        .cart-open #side-cart { right: 0; }
        .close-btn { background: #eee; border: none; padding: 5px 10px; border-radius: 10px; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <div class="top-banner">Atendimento exclusivo pelo WhatsApp | Envio para todo o Brasil 🇧🇷</div>
    
    <header>
        <h1>Belinna Store</h1>
        <p>Sua beleza, nossa missão.</p>
    </header>

    <div class="grid">
        <div class="nav-card"><h3>Sobre Nós</h3></div>
        <div class="nav-card"><h3>Makes</h3></div>
        <div class="nav-card"><h3>Skincare</h3></div>
        <div class="nav-card"><h3>Corpo & Cuidados Íntimos</h3></div>
        <div class="nav-card"><h3>Clientes</h3></div>
    </div>

    <div class="grid">
        <div class="product-card">
            <h3>Batom Matte Velvet</h3>
            <p>R$ 89,90</p>
            <div class="qty-selector">
                <button class="qty-btn" onclick="updateQty('batom', -1)">-</button>
                <span id="qty-batom">0</span>
                <button class="qty-btn" onclick="updateQty('batom', 1)">+</button>
            </div>
            <button class="btn-round" onclick="addToCart('Batom Matte Velvet', 89.90, 'batom')">Adicionar ao Carrinho</button>
        </div>
    </div>

    <!-- Carrinho -->
    <div id="side-cart">
        <button class="close-btn" onclick="toggleCart()">Fechar X</button>
        <h2>Seu Carrinho</h2>
        <div id="cart-items" style="flex-grow: 1;"></div>
        <p><strong>Total: <span id="cart-total">R$ 0,00</span></strong></p>
        <button class="btn-round" style="width: 100%; background: #25D366;" onclick="finalizar()">FINALIZAR PEDIDO NO WHATSAPP 📱</button>
    </div>

    <script>
        let carrinho = [];
        let qtys = { batom: 0 };

        function toggleCart() { document.body.classList.toggle('cart-open'); }
        function updateQty(id, delta) {
            qtys[id] = Math.max(0, qtys[id] + delta);
            document.getElementById('qty-'+id).innerText = qtys[id];
        }

        function addToCart(nome, preco, id) {
            if (qtys[id] === 0) return alert("Escolha uma quantidade!");
            let item = carrinho.find(i => i.nome === nome);
            if (item) item.qtd += qtys[id];
            else carrinho.push({ nome, preco, qtd: qtys[id] });
            renderCart();
            toggleCart();
        }

        function renderCart() {
            let container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            carrinho.forEach((item, index) => {
                total += item.preco * item.qtd;
                container.innerHTML += `<div class="cart-item">${item.qtd}x ${item.nome} <button onclick="carrinho.splice(${index},1); renderCart()">🗑️</button></div>`;
            });
            document.getElementById('cart-total').innerText = 'R$ ' + total.toFixed(2);
        }

        function finalizar() {
            let msg = "Olá! Gostaria de finalizar: " + carrinho.map(i => i.qtd + "x " + i.nome).join(", ");
            window.open(`https://api.whatsapp.com/send?phone=5511993610210&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
