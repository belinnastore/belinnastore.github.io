<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinna Store</title>
    <style>
        /* Estilos Integrados para não falhar */
        body { font-family: sans-serif; margin: 0; background-color: #fdfbf7; }
        .top-banner { background-color: #B76E79; color: #fff; text-align: center; padding: 12px; font-size: 0.8rem; text-transform: uppercase; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        
        .product-card { background: white; padding: 25px; border-radius: 15px; border: 1px solid #eee; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-details { text-align: left; margin: 20px 0; color: #444; line-height: 1.6; }
        
        button { padding: 10px 20px; cursor: pointer; background: #333; color: white; border: none; border-radius: 5px; }
        
        /* Carrinho Lateral */
        #side-cart { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.2); transition: 0.3s; padding: 20px; z-index: 1000; }
        .cart-open #side-cart { right: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>

    <div class="top-banner">Atendimento exclusivo pelo WhatsApp | Envio para todo o Brasil 🇧🇷</div>

    <div class="container">
        <div class="product-card">
            <h2>Batom Matte Velvet Rosé</h2>
            <div class="product-details">
                <p><strong>Marca:</strong> Belinna Beauty</p>
                <p><strong>Tamanho:</strong> 4g</p>
                <p><strong>Uso:</strong> Aplicar nos lábios conforme necessário.</p>
                <p><strong>Onde usar:</strong> Ocasiões diárias ou noturnas.</p>
            </div>
            <p><strong>R$ 89,90</strong></p>
            <button onclick="adicionarAoCarrinho('Batom Matte Velvet Rosé', 89.90)">Adicionar ao Carrinho</button>
        </div>
    </div>

    <!-- Carrinho Lateral -->
    <div id="side-cart">
        <h3>Seu Carrinho</h3>
        <div id="cart-items"></div>
        <p><strong>Total: <span id="cart-total">R$ 0,00</span></strong></p>
        <button onclick="enviarWhatsApp()" style="background: #25D366; width: 100%;">Finalizar no WhatsApp 📱</button>
        <button onclick="toggleCarrinho()" style="background: #ccc; width: 100%; margin-top: 10px;">Fechar</button>
    </div>

    <script>
        let carrinho = [];
        function toggleCarrinho() { document.body.classList.toggle('cart-open'); }

        function adicionarAoCarrinho(nome, preco) {
            let item = carrinho.find(i => i.nome === nome);
            if (item) item.qtd++;
            else carrinho.push({ nome, preco, qtd: 1 });
            renderizarCarrinho();
            document.body.classList.add('cart-open');
        }

        function alterarQtd(index, delta) {
            carrinho[index].qtd += delta;
            if (carrinho[index].qtd <= 0) carrinho.splice(index, 1);
            renderizarCarrinho();
        }

        function renderizarCarrinho() {
            let container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            carrinho.forEach((item, index) => {
                total += item.preco * item.qtd;
                container.innerHTML += `
                    <div class="cart-item">
                        <span>${item.nome} (${item.qtd}x)</span>
                        <div>
                            <button onclick="alterarQtd(${index}, -1)">-</button>
                            <button onclick="alterarQtd(${index}, 1)">+</button>
                            <button onclick="carrinho.splice(${index}, 1); renderizarCarrinho()">🗑️</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function enviarWhatsApp() {
            let msg = "Pedido Belinna Store:%0A";
            carrinho.forEach(i => msg += `${i.qtd}x ${i.nome}%0A`);
            window.open(`https://api.whatsapp.com/send?phone=5511993610210&text=${msg}`);
        }
    </script>
</body>
</html>
