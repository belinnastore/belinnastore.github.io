<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinna Store</title>
    <style>
        :root { --primary: #B76E79; --gold: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #fdfbf7; }
        .top-banner { background: var(--primary); color: #fff; text-align: center; padding: 10px; font-size: 0.8rem; text-transform: uppercase; }
        header { text-align: center; padding: 20px; }
        
        /* Grid de Categorias */
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .nav-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; cursor: pointer; transition: 0.3s; }
        .nav-card:hover { box-shadow: 0 0 15px var(--gold); border: 1px solid var(--gold); }
        
        /* Card de Produto */
        .product-card { background: white; padding: 30px; border-radius: 15px; border: 1px solid #eee; text-align: center; max-width: 700px; margin: 20px auto; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        
        /* Carrinho */
        #side-cart { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; z-index: 1000; padding: 20px; display: flex; flex-direction: column; }
        .cart-open #side-cart { right: 0; }
        .close-btn { background: #eee; border: none; padding: 5px; width: 100%; cursor: pointer; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="top-banner">Atendimento exclusivo pelo WhatsApp | Envio para todo o Brasil 🇧🇷</div>
    
    <header>
        <h1>Belinna Store</h1>
        <p>Sua beleza, nossa missão.</p>
    </header>

    <div class="category-grid">
        <div class="nav-card"><h3>Sobre Nós</h3></div>
        <div class="nav-card"><h3>Makes</h3></div>
        <div class="nav-card"><h3>Skincare</h3></div>
        <div class="nav-card"><h3>Corpo & Cuidados Íntimos</h3></div>
        <div class="nav-card"><h3>Clientes</h3></div>
    </div>

    <div class="product-card">
        <h3>Batom Matte Velvet</h3>
        <p>R$ 89,90</p>
        <div>
            <button onclick="changeQty(-1)">-</button>
            <span id="qty-batom">0</span>
            <button onclick="changeQty(1)">+</button>
        </div>
        <button class="btn-add" onclick="addToCart('Batom Matte Velvet', 89.90)">Adicionar ao Carrinho</button>
    </div>

    <!-- Carrinho -->
    <div id="side-cart">
        <button class="close-btn" onclick="toggleCart()">Fechar X</button>
        <h2>Seu Carrinho</h2>
        <div id="cart-items" style="flex-grow: 1;"></div>
        <p><strong>Total: <span id="cart-total">R$ 0,00</span></strong></p>
        <button class="btn-add" style="width: 100%; background: #25D366;" onclick="finalizar()">FINALIZAR PEDIDO NO WHATSAPP 📱</button>
    </div>

    <script>
        let cart = [];
        let currentQty = 0;

        function toggleCart() { document.body.classList.toggle('cart-open'); }
        function changeQty(delta) {
            currentQty = Math.max(0, currentQty + delta);
            document.getElementById('qty-batom').innerText = currentQty;
        }

        function addToCart(nome, preco) {
            if (currentQty === 0) return alert("Escolha uma quantidade maior que zero!");
            cart.push({ nome, preco, qtd: currentQty });
            renderCart();
            toggleCart();
        }

        function renderCart() {
            let container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<p>${i.qtd}x ${i.nome} <button onclick="removeFromCart()">🗑️</button></p>`).join('');
            document.getElementById('cart-total').innerText = 'R$ ' + (cart.reduce((sum, i) => sum + (i.preco * i.qtd), 0)).toFixed(2);
        }

        function removeFromCart() { cart = []; renderCart(); }

        function finalizar() {
            let msg = "Olá! Gostaria de finalizar: " + cart.map(i => i.qtd + "x " + i.nome).join(", ");
            window.open(`https://api.whatsapp.com/send?phone=5511993610210&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
